name: auto_track
description: "Suivi complet de véhicule - carburant, entretien, dépenses"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.8.4
  fl_chart: ^0.70.2
  provider: ^6.1.2
  intl: ^0.20.2
  image_picker: ^1.1.2
  file_picker: ^8.3.7
  go_router: ^14.6.3
  cached_network_image: ^3.4.1
  uuid: ^4.5.1
  shared_preferences: ^2.3.5
  percent_indicator: ^4.2.3
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
